name: Xbox360-LumenOS-Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Instalar Compilador PowerPC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc-linux-gnu make

      - name: Compilar
        run: make

      - name: Upload do ELF
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-OS-Boot-Alpha
          path: xenon.elf
